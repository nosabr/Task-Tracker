spring:
  application:
    name: email-sender

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  mail:
    host: ${MAIL_HOST:in-v3.mailjet.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        from: ${MAIL_FROM}
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    com.example: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.springframework.mail: WARN
    root: WARN